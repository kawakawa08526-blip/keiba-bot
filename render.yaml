services:
  - type: web
    name: keiba-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind "0.0.0.0:${PORT:-10000}" --timeout 120 --workers 1 --log-level info
    envVars:
      - key: PORT
        value: 10000
    healthCheckPath: /health
